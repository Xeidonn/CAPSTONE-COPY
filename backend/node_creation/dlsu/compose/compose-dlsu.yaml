volumes:
  peer0.dlsu.example.com:

networks:
  test:
    name: fabric_test

services:
  peer0.dlsu.example.com:
    container_name: peer0.dlsu.example.com
    image: hyperledger/fabric-peer:latest
    labels:
      service: hyperledger-fabric
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.dlsu.example.com
      - CORE_PEER_ADDRESS=peer0.dlsu.example.com:12051
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_LISTENADDRESS=0.0.0.0:12051
      - CORE_PEER_CHAINCODEADDRESS=peer0.dlsu.example.com:12052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:12052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.dlsu.example.com:12051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.dlsu.example.com:12051
      - CORE_PEER_LOCALMSPID=DLSUMSP
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0dlsu"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_test
    volumes:
      - ../../:/opt/gopath/src/github.com/hyperledger/fabric/peer
      - ../../organizations/peerOrganizations/dlsu.example.com/peers/peer0.dlsu.example.com/tls:/etc/hyperledger/fabric/tls
      - ../../organizations/peerOrganizations/dlsu.example.com/peers/peer0.dlsu.example.com/msp:/etc/hyperledger/fabric/msp
      - ${PWD}/docker/peercfg:/etc/hyperledger/peercfg
      - peer0.dlsu.example.com:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock # <--- Ensure this line is included
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    ports:
      - 12051:12051
    networks:
      - test
